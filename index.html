        </div>
      );

    // ─── Drop Zone ───
    const DropZone = ({ onFiles, multiple = false, titleKey = 'dropTitle', subKey = 'dropSub' }) => {
      const { t } = useLang();
      const [dragover, setDragover] = useState(false);
      const inputRef = useRef(null);
      const handleDrop = (e) => {
        e.preventDefault(); setDragover(false);
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.includes('video') || f.name.match(/\.(mov|mp4)$/i));
        if (files.length) onFiles(multiple ? files : [files[0]]);
      };
      return (
        <div
          onClick={() => inputRef.current.click()}
          onDragOver={(e) => { e.preventDefault(); setDragover(true); }}
          onDragLeave={() => setDragover(false)}
          onDrop={handleDrop}
          className={`border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition-all ${dragover ? 'border-purple-500 bg-purple-500/5' : 'border-gray-700 hover:border-gray-500 bg-white/[0.02]'}`}
        >
          <div className="text-5xl mb-4 opacity-30">&#9654;</div>
          <p className="text-lg text-gray-300 font-medium mb-2">{t[titleKey]}</p>
          <p className="text-sm text-gray-500">{t[subKey]}</p>
          <input ref={inputRef} type="file" accept=".mov,.mp4,video/quicktime,video/mp4" multiple={multiple} className="hidden" onChange={(e) => {
            const files = Array.from(e.target.files);
            if (files.length) onFiles(files);
            e.target.value = '';
          }} />
        </div>
      );
    };

    // ─── Info Pill ───
    const InfoPill = ({ label, value }) => (
      <div className="bg-white/5 border border-gray-800 rounded-lg px-3 py-2 text-center">
        <p className="text-[9px] font-semibold text-gray-500 uppercase tracking-widest mb-0.5">{label}</p>
        <p className="text-sm font-bold text-white">{value}</p>
      </div>
    );

    // ─── Single Video Mode ───
    const SingleMode = ({ setActionSlot }) => {
      const { t } = useLang();
      const videoRef = useRef(null);
      const exportRef = useRef(null);

      // Render state
      const [videoLoaded, setVideoLoaded] = useState(false);
      const [videoSrc, setVideoSrc] = useState(null);
      const [totalFrames, setTotalFrames] = useState(0);
      const [currentFrame, setCurrentFrame] = useState(0);
      const [duration, setDuration] = useState('--');
      const [resolution, setResolution] = useState('--');
      const [framesCount, setFramesCount] = useState('--');
      const [filename, setFilename] = useState('frame');
      const [showBatch, setShowBatch] = useState(false);
      const [batchInterval, setBatchInterval] = useState(30);
      const [batchUnit, setBatchUnit] = useState('frames');
      const [batchStart, setBatchStart] = useState(0);
      const [batchEnd, setBatchEnd] = useState(0);
      const [progress, setProgress] = useState(null);
      const [isExtracting, setIsExtracting] = useState(false);
      const [fps, setFps] = useState(30);

      // Mutable refs — keyboard handlers & async funcs always read current values
      const currentFrameRef = useRef(0);
      const totalFramesRef = useRef(0);
      const isExtractingRef = useRef(false);
      const filenameRef = useRef('frame');
      const videoLoadedRef = useRef(false);
      const fpsRef = useRef(30);
      const videoDurationRef = useRef(0);

      const formatTime = (s) => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
      const formatTimePrecise = (s) => `${Math.floor(s/60)}:${(s%60).toFixed(3).padStart(6,'0')}`;

      // Keep refs in sync with state
      useEffect(() => { currentFrameRef.current = currentFrame; }, [currentFrame]);
      useEffect(() => { totalFramesRef.current = totalFrames; }, [totalFrames]);
      useEffect(() => { isExtractingRef.current = isExtracting; }, [isExtracting]);
      useEffect(() => { filenameRef.current = filename; }, [filename]);
      useEffect(() => { videoLoadedRef.current = videoLoaded; }, [videoLoaded]);
      useEffect(() => { fpsRef.current = fps; }, [fps]);

      // Recalculate total frames when FPS changes (if a video is loaded)
      useEffect(() => {
        if (videoDurationRef.current > 0) {
          const newTotal = Math.floor(videoDurationRef.current * fps);
          setTotalFrames(newTotal);
          totalFramesRef.current = newTotal;
          setFramesCount(`~${newTotal}`);
          setBatchEnd(newTotal - 1);
        }
      }, [fps]);

      const loadVideo = (files) => {
        const file = files[0];
        const url = URL.createObjectURL(file);
        setVideoSrc(url);
        setFilename(file.name.replace(/\.[^/.]+$/, '') + '_frame');
        filenameRef.current = file.name.replace(/\.[^/.]+$/, '') + '_frame';
      };

      // Load video into the always-mounted <video> element
      useEffect(() => {
        const v = videoRef.current;
        if (!videoSrc || !v) return;
        v.src = videoSrc;
        const onMeta = () => {
          videoDurationRef.current = v.duration;
          const total = Math.floor(v.duration * fpsRef.current);
          setTotalFrames(total);
          totalFramesRef.current = total;
          setDuration(formatTime(v.duration));
          setResolution(`${v.videoWidth} x ${v.videoHeight}`);
          setFramesCount(`~${total}`);
          setBatchEnd(total - 1);
          setVideoLoaded(true);
          videoLoadedRef.current = true;
          setCurrentFrame(0);
          currentFrameRef.current = 0;
          // Capture first frame once video data is ready
          const tryCapture = () => capturePreview();
          v.addEventListener('seeked', tryCapture, { once: true });
          v.currentTime = 0.001; // avoid no-op seek when already at 0
        };
        v.addEventListener('loadedmetadata', onMeta, { once: true });
        return () => v.removeEventListener('loadedmetadata', onMeta);
      }, [videoSrc]);

      // Capture frame to export canvas on every seek (unless extracting)
      const capturePreview = useCallback(() => {
        const v = videoRef.current;
        const exp = exportRef.current;
        if (!v || !exp || v.videoWidth === 0) return;
        const w = v.videoWidth, h = v.videoHeight;
        exp.width = w; exp.height = h;
        exp.getContext('2d').drawImage(v, 0, 0, w, h);
      }, []);

      // Single seeked listener — uses ref to check extracting state (no stale closure)
      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        const onSeeked = () => {
          if (!isExtractingRef.current && videoLoadedRef.current) capturePreview();
        };
        v.addEventListener('seeked', onSeeked);
        return () => v.removeEventListener('seeked', onSeeked);
      }, [capturePreview]);

      const goToFrame = useCallback((frameNum) => {
        const v = videoRef.current;
        const max = totalFramesRef.current - 1;
        frameNum = Math.max(0, Math.min(frameNum, max));
        setCurrentFrame(frameNum);
        currentFrameRef.current = frameNum;
        if (v) v.currentTime = frameNum / fpsRef.current;
      }, []);

      // captureFrameAt — uses one-shot addEventListener (no onseeked conflict)
      const captureFrameAt = useCallback((frameNum) => {
        return new Promise(resolve => {
          const v = videoRef.current;
          const handler = () => {
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            resolve(c.toDataURL('image/png'));
          };
          v.addEventListener('seeked', handler, { once: true });
          v.currentTime = frameNum / fpsRef.current;
        });
      }, []);

      const download = useCallback((dataUrl, fn) => {
        const a = document.createElement('a'); a.download = fn; a.href = dataUrl; a.click();
      }, []);

      const saveCurrent = useCallback(() => {
        const exp = exportRef.current;
        if (!exp) return;
        download(exp.toDataURL('image/png'), `${filenameRef.current || 'frame'}_${currentFrameRef.current}.png`);
      }, [download]);

      const extractFirstLast = useCallback(async () => {
        setIsExtracting(true);
        isExtractingRef.current = true;
        const name = filenameRef.current || 'frame';
        const total = totalFramesRef.current;
        download(await captureFrameAt(0), `${name}_first_0.png`);
        await new Promise(r => setTimeout(r, 300));
        download(await captureFrameAt(total - 1), `${name}_last_${total - 1}.png`);
        goToFrame(currentFrameRef.current);
        setIsExtracting(false);
        isExtractingRef.current = false;
      }, [captureFrameAt, download, goToFrame]);

      const runBatch = async () => {
        const step = batchUnit === 'seconds' ? batchInterval * fps : batchInterval;
        const framesToExtract = [];
        for (let f = batchStart; f <= batchEnd; f += step) framesToExtract.push(Math.floor(f));
        if (framesToExtract[framesToExtract.length - 1] !== batchEnd) framesToExtract.push(batchEnd);
        setIsExtracting(true);
        isExtractingRef.current = true;
        for (let i = 0; i < framesToExtract.length; i++) {
          setProgress({ current: i + 1, total: framesToExtract.length });
          download(await captureFrameAt(framesToExtract[i]), `${filenameRef.current || 'frame'}_${framesToExtract[i]}.png`);
          await new Promise(r => setTimeout(r, 200));
        }
        setProgress({ current: framesToExtract.length, total: framesToExtract.length, done: true });
        goToFrame(currentFrameRef.current);
        setIsExtracting(false);
        isExtractingRef.current = false;
        setTimeout(() => setProgress(null), 3000);
      };

      const resetVideo = () => {
        const v = videoRef.current;
        if (v) { v.removeAttribute('src'); v.load(); }
        setVideoLoaded(false); videoLoadedRef.current = false;
        setVideoSrc(null); setCurrentFrame(0); currentFrameRef.current = 0;
        setShowBatch(false); setProgress(null);
        setIsExtracting(false); isExtractingRef.current = false;
      };

      // Push "Load New Video" button into the tabs row via App state
      const resetVideoRef = useRef(null);
      resetVideoRef.current = resetVideo;
      useEffect(() => {
        if (videoLoaded) {
          setActionSlot(
            React.createElement('button', {
              onClick: () => resetVideoRef.current?.(),
              className: 'text-sm text-gray-400 hover:text-white transition-colors border border-gray-700 rounded-full px-5 py-2 hover:border-gray-500'
            }, t.loadNew)
          );
        } else {
          setActionSlot(null);
        }
        return () => setActionSlot(null);
      }, [videoLoaded, t.loadNew, setActionSlot]);

      // Keyboard shortcuts — reads from refs, never stale
      useEffect(() => {
        const handleKey = (e) => {
          if (!videoLoadedRef.current || isExtractingRef.current || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
          switch (e.key) {
            case 'ArrowLeft': goToFrame(currentFrameRef.current - 1); break;
            case 'ArrowRight': goToFrame(currentFrameRef.current + 1); break;
            case 'Home': goToFrame(0); break;
            case 'End': goToFrame(totalFramesRef.current - 1); break;
            case 's': case 'S': saveCurrent(); break;
            case 'b': case 'B': extractFirstLast(); break;
          }
        };
        document.addEventListener('keydown', handleKey);
        return () => document.removeEventListener('keydown', handleKey);
      }, [goToFrame, saveCurrent, extractFirstLast]);

      return (
        <div className="space-y-4">
          {!videoLoaded && <DropZone onFiles={loadVideo} />}

          {/* Video Player — always mounted, hidden until loaded */}
          <div className={`bg-white/[0.03] border border-gray-800 rounded-2xl p-4 space-y-3 ${videoLoaded ? '' : 'hidden'}`}>
            <div className="rounded-xl overflow-hidden bg-black">
              <video ref={videoRef} className="w-full block" preload="auto" />
            </div>

                {/* Scrubber */}
                <div>
                  <div className="flex justify-between text-xs text-gray-400 mb-2">
                    <span>{t.frame}: <strong className="text-white">{currentFrame}</strong></span>
                    <span>{t.time}: <strong className="text-white">{formatTimePrecise(currentFrame / fps)}</strong></span>
                  </div>
                  <input type="range" min="0" max={totalFrames - 1} value={currentFrame} onChange={(e) => goToFrame(parseInt(e.target.value))} />
                </div>

              </div>

          {/* Two cards side by side below the video */}
          <div className={`grid grid-cols-1 lg:grid-cols-2 gap-4 ${videoLoaded ? '' : 'hidden'}`}>

            {/* Left card: Video Info & Navigation */}
            <div className="bg-white/[0.03] border border-gray-800 rounded-2xl p-5 space-y-4">
              <div className="grid grid-cols-3 gap-3">
                <InfoPill label={t.duration} value={duration} />
                <InfoPill label={t.resolution} value={resolution} />
                <InfoPill label={t.estFrames} value={framesCount} />
              </div>
              <div className="flex justify-center gap-2 flex-wrap">
                <button onClick={() => goToFrame(0)} className="px-3.5 py-1.5 border border-gray-700 rounded-full text-xs text-gray-300 hover:border-gray-500 hover:text-white transition-colors">|&#9664; {t.first}</button>
                <button onClick={() => goToFrame(currentFrame - 1)} className="px-3.5 py-1.5 border border-gray-700 rounded-full text-xs text-gray-300 hover:border-gray-500 hover:text-white transition-colors">&#9664; {t.prev}</button>
                <button onClick={() => goToFrame(currentFrame + 1)} className="px-3.5 py-1.5 border border-gray-700 rounded-full text-xs text-gray-300 hover:border-gray-500 hover:text-white transition-colors">{t.next} &#9654;</button>
                <button onClick={() => goToFrame(totalFrames - 1)} className="px-3.5 py-1.5 border border-gray-700 rounded-full text-xs text-gray-300 hover:border-gray-500 hover:text-white transition-colors">{t.last} &#9654;|</button>
              </div>
              <div className="flex justify-center items-center gap-3">
                <label className="text-sm text-gray-400">{t.goToFrame}:</label>
                <input type="number" min="0" max={totalFrames - 1} value={currentFrame} onChange={(e) => goToFrame(parseInt(e.target.value) || 0)}
                  className="w-24 px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-center text-sm focus:outline-none focus:border-purple-500 transition-colors" />
              </div>
              <div className="flex justify-center items-center gap-3">
                <label className="text-sm text-gray-400">FPS:</label>
                <select value={fps} onChange={(e) => setFps(Number(e.target.value))}
                  className="px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-purple-500 appearance-none">
                  <option value={24} className="bg-black">24</option>
                  <option value={25} className="bg-black">25</option>
                  <option value={30} className="bg-black">30</option>
                  <option value={60} className="bg-black">60</option>
                </select>
              </div>
            </div>

            {/* Right card: Export Controls */}
            <div className="bg-white/[0.03] border border-gray-800 rounded-2xl p-5 space-y-4">
              <canvas ref={exportRef} className="hidden-canvas" />
              <div className="flex items-center gap-3 flex-wrap">
                <label className="text-sm text-gray-400">{t.filename}:</label>
                <input type="text" value={filename} onChange={(e) => { setFilename(e.target.value); filenameRef.current = e.target.value; }}
                  className="flex-1 min-w-0 px-4 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-purple-500 transition-colors" />
                <span className="text-gray-500 text-sm">.png</span>
              </div>
              <div className="flex gap-3 flex-wrap">
                <button onClick={saveCurrent} disabled={isExtracting} className="flex-1 px-4 py-2.5 bg-gradient text-white font-semibold rounded-full hover-lift shadow-lg shadow-purple-500/20 disabled:opacity-50 disabled:cursor-not-allowed text-xs">{t.saveCurrent}</button>
                <button onClick={extractFirstLast} disabled={isExtracting} className="flex-1 px-4 py-2.5 bg-white text-black font-semibold rounded-full hover-lift disabled:opacity-50 disabled:cursor-not-allowed text-xs">{t.firstAndLast}</button>
              </div>
              <div className="flex justify-center items-center gap-3">
                <span className="text-sm text-gray-400">{t.batchMode}</span>
                <button onClick={() => setShowBatch(!showBatch)} className={`w-12 h-6 rounded-full transition-all relative ${showBatch ? 'bg-gradient' : 'bg-gray-700'}`}>
                  <div className={`w-5 h-5 bg-white rounded-full absolute top-0.5 transition-transform shadow ${showBatch ? 'translate-x-6' : 'translate-x-0.5'}`} />
                </button>
              </div>
              {showBatch && (
                <div className="bg-white/[0.03] border border-gray-800 rounded-xl p-5 space-y-4">
                  <p className="text-sm font-medium text-gray-300">{t.batchExport}</p>
                  <div className="flex items-center gap-3 flex-wrap">
                    <label className="text-sm text-gray-400">{t.extractEvery}</label>
                    <input type="number" value={batchInterval} min="1" onChange={(e) => setBatchInterval(parseInt(e.target.value) || 1)}
                      className="w-20 px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-center text-sm focus:outline-none focus:border-purple-500" />
                    <select value={batchUnit} onChange={(e) => setBatchUnit(e.target.value)}
                      className="px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-purple-500 appearance-none">
                      <option value="frames" className="bg-black">{t.frames}</option>
                      <option value="seconds" className="bg-black">{t.seconds}</option>
                    </select>
                  </div>
                  <div className="flex items-center gap-3 flex-wrap">
                    <label className="text-sm text-gray-400">{t.fromFrame}</label>
                    <input type="number" value={batchStart} min="0" onChange={(e) => setBatchStart(parseInt(e.target.value) || 0)}
                      className="w-20 px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-center text-sm focus:outline-none focus:border-purple-500" />
                    <label className="text-sm text-gray-400">{t.to}</label>
                    <input type="number" value={batchEnd} min="0" onChange={(e) => setBatchEnd(parseInt(e.target.value) || 0)}
                      className="w-20 px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-center text-sm focus:outline-none focus:border-purple-500" />
                  </div>
                  <button onClick={runBatch} disabled={isExtracting} className="w-full px-5 py-3 border border-gray-600 text-white font-semibold rounded-full hover:border-white transition-colors disabled:opacity-50 text-sm">{t.extractBatch}</button>
                  {progress && (
                    <div className="space-y-2">
                      <div className="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden">
                        <div className="h-full bg-gradient transition-all rounded-full" style={{ width: `${(progress.current / progress.total) * 100}%` }} />
                      </div>
                      <p className="text-xs text-gray-400">
                        {progress.done ? `${t.done}! ${progress.total} ${t.frames} ${t.extracted}.` : `${t.extracting} ${progress.current} ${t.of} ${progress.total}...`}
                      </p>
                    </div>
                  )}
                </div>
              )}
            </div>

          </div>

          {/* Keyboard Shortcuts — same row as the cards */}
          <div className={`bg-white/[0.03] border border-gray-800 rounded-2xl p-5 ${videoLoaded ? '' : 'hidden'}`}>
            <p className="text-xs font-semibold gradient-text uppercase tracking-wider mb-3">{t.keyboardShortcuts}</p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
              {[t.shortcutArrows, t.shortcutHomeEnd, t.shortcutS, t.shortcutB].map((s, i) => (
                <p key={i} className="text-xs text-gray-500">{s}</p>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ─── Bulk Mode ───
    const BulkMode = () => {
      const { t } = useLang();
      const [files, setFiles] = useState([]);
      const [extractFirst, setExtractFirst] = useState(true);
      const [extractLast, setExtractLast] = useState(true);
      const [statuses, setStatuses] = useState({});
      const [progress, setProgress] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [fps, setFps] = useState(30);

      const addFiles = (newFiles) => {
        setFiles(prev => {
          const existing = new Set(prev.map(f => f.name));
          return [...prev, ...newFiles.filter(f => !existing.has(f.name))];
        });
      };

      const removeFile = (index) => {
        setFiles(prev => prev.filter((_, i) => i !== index));
      };

      const clearAll = () => { setFiles([]); setStatuses({}); setProgress(null); };

      const download = (dataUrl, fn) => {
        const a = document.createElement('a'); a.download = fn; a.href = dataUrl; a.click();
      };

      const processAll = async () => {
        if (!extractFirst && !extractLast) { alert(t.selectOption); return; }
        if (files.length === 0) { alert(t.addFiles); return; }
        setIsProcessing(true);
        const bulkVideo = document.getElementById('bulkVideoPlayer');

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          setStatuses(prev => ({ ...prev, [i]: 'processing' }));
          setProgress({ current: i + 1, total: files.length, filename: file.name });

          try {
            const results = await new Promise((resolve, reject) => {
              bulkVideo.src = URL.createObjectURL(file);
              bulkVideo.onloadedmetadata = async () => {
                const total = Math.floor(bulkVideo.duration * fps);
                const baseName = file.name.replace(/\.[^/.]+$/, '');
                const res = [];
                const captureAt = (frameNum) => new Promise(r => {
                  bulkVideo.currentTime = frameNum / fps;
                  bulkVideo.onseeked = () => {
                    const c = document.createElement('canvas');
                    c.width = bulkVideo.videoWidth; c.height = bulkVideo.videoHeight;
                    c.getContext('2d').drawImage(bulkVideo, 0, 0);
                    r(c.toDataURL('image/png'));
                  };
                });
                if (extractFirst) res.push({ data: await captureAt(0), filename: `${baseName}_first.png` });
                if (extractLast) res.push({ data: await captureAt(total - 1), filename: `${baseName}_last.png` });
                URL.revokeObjectURL(bulkVideo.src);
                resolve(res);
              };
              bulkVideo.onerror = reject;
            });
            for (const { data, filename } of results) {
              download(data, filename);
              await new Promise(r => setTimeout(r, 150));
            }
            setStatuses(prev => ({ ...prev, [i]: 'done' }));
          } catch (err) {
            console.error(err);
            setStatuses(prev => ({ ...prev, [i]: 'error' }));
          }
        }
        setProgress({ current: files.length, total: files.length, done: true });
        setIsProcessing(false);
        setTimeout(() => setProgress(null), 3000);
      };

      return (
        <div className="space-y-6">
          <DropZone onFiles={addFiles} multiple titleKey="dropBulkTitle" subKey="dropBulkSub" />

          {files.length > 0 && (
            <>
              {/* File List */}
              <div className="bg-white/[0.03] border border-gray-800 rounded-2xl p-6">
                <p className="text-sm font-semibold gradient-text uppercase tracking-wider mb-4">{t.videosToProcess} ({files.length})</p>
                <div className="space-y-2 max-h-72 overflow-y-auto">
                  {files.map((file, i) => (
                    <div key={i} className="flex items-center justify-between px-4 py-3 bg-white/[0.03] border border-gray-800 rounded-xl">
                      <span className="text-sm text-gray-300 truncate flex-1 mr-4">{file.name}</span>
                      <span className={`text-xs font-medium mr-3 ${statuses[i] === 'done' ? 'text-green-400' : statuses[i] === 'processing' ? 'gradient-text' : statuses[i] === 'error' ? 'text-red-400' : 'text-gray-500'}`}>
                        {statuses[i] === 'done' ? t.done : statuses[i] === 'processing' ? t.processing + '...' : statuses[i] === 'error' ? t.error : t.pending}
                      </span>
                      {!isProcessing && (
                        <button onClick={() => removeFile(i)} className="text-gray-600 hover:text-red-400 transition-colors text-sm">&times;</button>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              {/* Options */}
              <div className="bg-white/[0.03] border border-gray-800 rounded-2xl p-6 space-y-5">
                <p className="text-sm font-medium text-gray-300 text-center">{t.extractOptions}</p>
                <div className="flex justify-center gap-4 flex-wrap">
                  <button onClick={() => setExtractFirst(!extractFirst)} className={`px-5 py-3 rounded-xl text-sm font-medium transition-all ${extractFirst ? 'bg-gradient text-white shadow-lg shadow-purple-500/20' : 'border border-gray-700 text-gray-400'}`}>
                    |&#9664; {t.firstFrame}
                  </button>
                  <button onClick={() => setExtractLast(!extractLast)} className={`px-5 py-3 rounded-xl text-sm font-medium transition-all ${extractLast ? 'bg-gradient text-white shadow-lg shadow-purple-500/20' : 'border border-gray-700 text-gray-400'}`}>
                    {t.lastFrame} &#9654;|
                  </button>
                </div>
                <div className="flex justify-center items-center gap-3">
                  <label className="text-sm text-gray-400">FPS:</label>
                  <select value={fps} onChange={(e) => setFps(Number(e.target.value))}
                    className="px-3 py-2 bg-white/5 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-purple-500 appearance-none">
                    <option value={24} className="bg-black">24</option>
                    <option value={25} className="bg-black">25</option>
                    <option value={30} className="bg-black">30</option>
                    <option value={60} className="bg-black">60</option>
                  </select>
                </div>
                <div className="flex justify-center gap-3">
                  <button onClick={processAll} disabled={isProcessing} className="px-6 py-3 bg-white text-black font-semibold rounded-full hover-lift disabled:opacity-50">{t.processAll}</button>
                  <button onClick={clearAll} disabled={isProcessing} className="px-6 py-3 border border-gray-700 text-gray-300 font-medium rounded-full hover:border-gray-500 transition-colors disabled:opacity-50">{t.clearAll}</button>
                </div>
                {progress && (
                  <div className="space-y-2">
                    <div className="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden">
                      <div className="h-full bg-gradient transition-all rounded-full" style={{ width: `${(progress.current / progress.total) * 100}%` }} />
                    </div>
                    <p className="text-xs text-gray-400 text-center">
                      {progress.done ? `${t.done}! ${t.processed} ${progress.total} ${t.videos}.` : `${t.processing} ${progress.current} ${t.of} ${progress.total}: ${progress.filename}`}
                    </p>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      );
    };

    // ─── Footer ───
    const FooterSection = () => {
      const { t } = useLang();
      return (
        <footer className="mt-8 pb-8 px-6">
          <div className="max-w-5xl mx-auto">
            <div className="flex flex-col md:flex-row justify-between items-center gap-3 pt-6 border-t border-gray-800">
              <div className="flex items-center gap-3">
                <span className="text-sm font-bold gradient-text">{t.brand}</span>
                <span className="text-xs text-gray-600">|</span>
                <Logo />
              </div>
              <p className="text-[11px] text-gray-500">
                by <a href="https://experimenting.ai" target="_blank" rel="noopener noreferrer" style={{ color: '#8000FF' }}>experimenting.ai</a>
              </p>
            </div>
          </div>
        </footer>
      );
    };

    // ─── App ───
    function App() {
      const [lang, setLang] = useState('en');
      const [mode, setMode] = useState('single');
      const [actionSlot, setActionSlot] = useState(null);
      const t = translations[lang];

      return (
        <LangContext.Provider value={{ lang, setLang, t }}>
          <div className="min-h-screen text-white" style={{ backgroundColor: '#121212' }}>
            <Header />
            <main className="px-6 pb-8">
              <div className="max-w-5xl mx-auto">
                <ModeTabs mode={mode} setMode={setMode} rightSlot={mode === 'single' ? actionSlot : null} />
                {mode === 'single' ? <SingleMode setActionSlot={setActionSlot} /> : <BulkMode />}
              </div>
            </main>
            <FooterSection />
          </div>
        </LangContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
